<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PA TOKENS</title>

<style>
body{
margin:0;
background:#0b0b0f;
color:white;
font-family:Arial;
}

.top{
padding:12px;
text-align:center;
font-size:20px;
color:#ffcc00;
font-weight:bold;
}

.balance{
margin:10px;
padding:12px;
border-radius:12px;
background:#15151c;
display:flex;
justify-content:space-between;
}

.page{display:none;padding:10px;}
.active{display:block;}

.slot-box{
padding:20px;
margin:10px;
border-radius:18px;
border:2px solid #ffcc00;
text-align:center;
}

.reel{font-size:40px;margin:0 6px;}

.bet{display:flex;margin:10px;}
.bet button{
flex:1;
padding:12px;
background:#222;
border:none;
color:white;
}

.spin{
margin:10px;
width:calc(100% - 20px);
padding:15px;
background:#2ecc71;
border:none;
border-radius:12px;
font-size:18px;
color:black;
font-weight:bold;
}

.card{
margin:10px;
padding:15px;
background:#121218;
border-radius:15px;
border:1px solid #222;
}

.task{
margin-top:10px;
padding:10px;
background:#0e0e14;
border-radius:12px;
border:1px solid #1f1f2a;
}

.task button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#ffcc00;
color:black;
font-weight:bold;
}

.stat{
padding:8px;
margin:6px 0;
background:#0e0e14;
border-radius:10px;
border:1px solid #1f1f2a;
}

.nav{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
background:#111;
}

.nav button{
flex:1;
padding:12px;
background:none;
border:none;
color:white;
font-size:14px;
}

.nav button.active{
background:#ffcc00;
color:black;
}

.coin{
position:fixed;
font-size:22px;
pointer-events:none;
}
</style>
</head>

<body>

<div class="top">🎰 PA TOKENS</div>

<div class="balance">
<span>💰 Баланс:</span>
<span id="bal"></span>
</div>

<!-- SLOT -->
<div id="page1" class="page active">

<div id="slotBox" class="slot-box">
<span id="r1" class="reel">🍒</span>
<span id="r2" class="reel">🍒</span>
<span id="r3" class="reel">🍒</span>
</div>

<div class="bet">
<button onclick="changeBet(-100)">-</button>
<button id="bet">100</button>
<button onclick="changeBet(100)">+</button>
</div>

<button class="spin" onclick="spin()">КРУТИТЬ</button>

</div>

<!-- TASKS -->
<div id="page2" class="page">

<div class="card">
<h3>🎁 ЗАДАНИЯ</h3>

<div class="task">
<p>🎰 5 спинов</p>
<p id="t1">0 / 5</p>
<button onclick="claim1()">+5000</button>
</div>

<div class="task">
<p>🎰 10 спинов</p>
<p id="t2">0 / 10</p>
<button onclick="claim2()">+15000</button>
</div>

<div class="task">
<p>💎 Выиграй 1 раз</p>
<p id="t3">0 / 1</p>
<button onclick="claim3()">+25000</button>
</div>

</div>
</div>

<!-- PROMO -->
<div id="page3" class="page">

<div class="card">
<h3>🎟 ПРОМОКОДЫ</h3>

<input id="promo" placeholder="введите код">
<button onclick="usePromo()">Активировать</button>
<p id="promoText"></p>

</div>

</div>

<!-- PROFILE -->
<div id="page4" class="page">

<div class="card">
<h3>👤 ПРОФИЛЬ</h3>

<div class="stat">💰 Баланс: <span id="balP"></span></div>
<div class="stat">⭐ Уровень: <span id="lvl"></span></div>
<div class="stat">⚡ XP: <span id="xp"></span></div>
<div class="stat">🏆 Рекорд: <span id="best"></span></div>

</div>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="openPage(1)" class="active">🎰</button>
<button onclick="openPage(2)">🎁</button>
<button onclick="openPage(3)">🎟</button>
<button onclick="openPage(4)">👤</button>
</div>

<script>

/* ===== USER ===== */
let user = JSON.parse(localStorage.getItem("user")) || {};

user.bal = Number(user.bal);
if(!user.bal || isNaN(user.bal) || user.bal < 5000){
user.bal = 5000;
}

user.bet = user.bet || 100;
user.xp = user.xp || 0;
user.lvl = user.lvl || 1;
user.bestWin = user.bestWin || 0;

user.tasks = user.tasks || {
spins:0,
win:false,
r1:false,
r2:false,
r3:false
};

function save(){
localStorage.setItem("user",JSON.stringify(user));
}

function safe(n){
return isNaN(n)?0:n;
}

/* UPDATE */
function update(){

bal.innerText = safe(user.bal);
bet.innerText = safe(user.bet);

lvl.innerText = safe(user.lvl);
xp.innerText = safe(user.xp);
best.innerText = safe(user.bestWin);

/* TASKS */
t1.innerText = user.tasks.spins + " / 5";
t2.innerText = user.tasks.spins + " / 10";
t3.innerText = user.tasks.win ? "1 / 1" : "0 / 1";

balP.innerText = safe(user.bal);

save();
}

/* NAV */
function openPage(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("page"+n).classList.add("active");
}

/* BET */
function changeBet(x){
user.bet = safe(user.bet + x);
if(user.bet < 100) user.bet = 100;
update();
}

/* SPIN */
let spinning=false;

function spin(){

if(spinning) return;
if(user.bet > user.bal) return;

spinning=true;

let sym=["🍒","🍊","🍇","💎","7️⃣"];

user.bal -= user.bet;
user.tasks.spins++;

let interval=setInterval(()=>{
r1.innerText=sym[Math.random()*5|0];
r2.innerText=sym[Math.random()*5|0];
r3.innerText=sym[Math.random()*5|0];
},80);

setTimeout(()=>{

clearInterval(interval);

let a=sym[Math.random()*5|0];
let b=sym[Math.random()*5|0];
let c=sym[Math.random()*5|0];

r1.innerText=a;
r2.innerText=b;
r3.innerText=c;

let m=0;

if(a=="7️⃣"&&b=="7️⃣"&&c=="7️⃣") m=50;
else if(a=="💎"&&b=="💎"&&c=="💎") m=20;
else if(a=="🍇"&&b=="🍇"&&c=="🍇") m=10;
else if(a=="🍊"&&b=="🍊"&&c=="🍊") m=5;
else if(a=="🍒"&&b=="🍒"&&c=="🍒") m=3;
else if(a==b||b==c) m=0.5;

let win = Math.floor(user.bet * m);
if(isNaN(win)) win = 0;

if(win > 0){
user.bal += win;
user.tasks.win = true;
coinBurst();

if(win > user.bestWin){
user.bestWin = win;
}
}

user.xp += 10;
if(user.xp >= user.lvl * 100){
user.xp = 0;
user.lvl++;
}

update();
spinning=false;

},3000);
}

/* 🪙 COINS */
function coinBurst(){
for(let i=0;i<30;i++){
let c=document.createElement("div");
c.innerText="🪙";
c.style.position="fixed";
c.style.left="50%";
c.style.top="60%";
c.style.fontSize="22px";
c.style.pointerEvents="none";
document.body.appendChild(c);

let x=(Math.random()-0.5)*500;
let y=(Math.random()-1)*500;

c.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${x}px,${y}px)`,opacity:0}
],{
duration:900+Math.random()*400,
easing:"ease-out"
});

setTimeout(()=>c.remove(),1200);
}
}

/* PROMO (ВОЗВРАЩЕНО + НОВЫЕ КОДЫ) */
function usePromo(){

let code = promo.value.trim().toUpperCase();

let list = {
"START":10000,
"VIP2026":50000,
"LUCKY":25000,
"GOLD":40000,
"BONUS":30000,
"FREE5000":5000,
"MEGA777":77777,
"PA777":777000,
"TOP":60000
"ADMIN PROMO1":9999999,
};

if(!list[code]){
promoText.innerText="❌ неверный";
return;
}

let used = JSON.parse(localStorage.getItem("promoUsed")) || {};

if(used[code]){
promoText.innerText="⚠️ уже использован";
return;
}

user.bal += list[code];
used[code]=true;

localStorage.setItem("promoUsed",JSON.stringify(used));

promoText.innerText="✅ +"+list[code];

update();
}

/* CLAIM */
function claim1(){
if(user.tasks.spins >= 5 && !user.tasks.r1){
user.bal += 5000;
user.tasks.r1 = true;
update();
}
}

function claim2(){
if(user.tasks.spins >= 10 && !user.tasks.r2){
user.bal += 15000;
user.tasks.r2 = true;
update();
}
}

function claim3(){
if(user.tasks.win && !user.tasks.r3){
user.bal += 25000;
user.tasks.r3 = true;
update();
}
}

update();

</script>

</body>
</html>
